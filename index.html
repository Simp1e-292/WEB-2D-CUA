<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric 2D Door Drawing</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --text-color: #1f2937;
            --primary: #3b82f6;
            --border-color: #e5e7eb;
            --door-stroke: #111827;
            --dim-red: #ef4444;
            --dim-blue: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 360px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            z-index: 10;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input[type="number"], .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        
        .form-group input[type="file"] {
            font-size: 0.85rem;
            padding: 8px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .result-panel {
            margin-top: 24px;
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .result-panel h3 {
            margin-top: 0;
            font-size: 1rem;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #e2e8f0;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .result-value {
            font-weight: 600;
            color: var(--primary);
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background-color: #e2e8f0;
            overflow: auto;
        }

        .canvas-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .door-line {
            stroke: var(--door-stroke);
            stroke-width: 2;
            fill: none;
            stroke-linejoin: round;
        }
        
        .door-fill {
            fill: #fdfbf7;
            stroke: var(--door-stroke);
            stroke-width: 2;
        }

        .dim-line-red {
            stroke: var(--dim-red);
            stroke-width: 1.5;
            fill: none;
        }

        .dim-text-red {
            fill: var(--dim-red);
            font-size: 32px;
            font-weight: 600;
            text-anchor: middle;
        }

        .dim-line-blue {
            stroke: var(--dim-blue);
            stroke-width: 1.5;
            stroke-dasharray: 6 4;
            fill: none;
        }

        .dim-text-blue {
            fill: var(--dim-blue);
            font-size: 24px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        
        .panel-core path, .panel-core polygon, .panel-core rect, .panel-core line, .panel-core circle {
            stroke: var(--door-stroke) !important;
            stroke-width: 2 !important;
            fill: none !important;
            vector-effect: non-scaling-stroke;
        }
        
        /* Hidden SVG for measuring bounding box */
        #hiddenSvgContainer {
            position: absolute;
            visibility: hidden;
            pointer-events: none;
            width: 0;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Thông Số Cửa</h1>
        
        <div class="form-row">
            <div class="form-group">
                <label for="inputW">Chiều rộng (W) mm</label>
                <input type="number" id="inputW" value="700" min="500" max="2000" step="1">
            </div>
            <div class="form-group">
                <label for="inputH">Chiều cao (H) mm</label>
                <input type="number" id="inputH" value="2290" min="1800" max="3000" step="1">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 16px 0;">
        
        <div class="form-group">
            <label for="inputFile">Tải file lõi Huỳnh (.svg)</label>
            <input type="file" id="inputFile" accept=".svg">
            <small style="color: #64748b; font-size: 0.8rem; display: block; margin-top: 4px;">
                *Kích thước sẽ tự động lấy từ tên file (vd: H10 210x1100.svg) nếu có.
            </small>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="inputHuynhW">Rộng Huỳnh (mm)</label>
                <input type="number" id="inputHuynhW" value="520" readonly style="background-color: #f1f5f9; color: #475569; cursor: not-allowed;" title="Kích thước lấy tự động từ lõi SVG">
            </div>
            <div class="form-group">
                <label for="inputHuynhH">Cao Huỳnh (mm)</label>
                <input type="number" id="inputHuynhH" value="1600" readonly style="background-color: #f1f5f9; color: #475569; cursor: not-allowed;" title="Kích thước lấy tự động từ lõi SVG">
            </div>
        </div>

        <div class="result-panel">
            <h3>Kết Quả Tính Toán</h3>
            
            <div class="result-item">
                <span>Thông thuỷ ngang:</span>
                <span id="resThongThuyW" class="result-value">-</span>
            </div>
            <div class="result-item" style="margin-bottom: 12px;">
                <span>Thông thuỷ dọc:</span>
                <span id="resThongThuyH" class="result-value">-</span>
            </div>

            <div class="result-item">
                <span>Kích thước cánh rộng:</span>
                <span id="resLeafW" class="result-value">-</span>
            </div>
            <div class="result-item" style="margin-bottom: 12px;">
                <span>Kích thước cánh cao:</span>
                <span id="resLeafH" class="result-value">-</span>
            </div>

            <div class="result-item">
                <span>Đố cánh ngang:</span>
                <span id="resDoNgang" class="result-value">-</span>
            </div>
            <div class="result-item">
                <span>Đố cánh dọc:</span>
                <span id="resDoDoc" class="result-value">-</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <svg id="doorSvg" xmlns="http://www.w3.org/2000/svg">
                <!-- SVG Content generated by JS -->
            </svg>
            
            <!-- Vùng ẩn để đo đạc bounding box của file SVG vừa upload -->
            <div id="hiddenSvgContainer">
                <svg id="measureSvg" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>
    </div>

    <script>
        const CONSTANTS = {
            frameTop: 50,    
            frameSide: 50,
            leafGap: 5,
            paddingX: 200,
            paddingY: 200
        };

        let currentPanelSvgContent = `
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 214.401 294.302L 6.88924 294.302L 6.05418 293.467L 6.05418 257.977L 6.88924 257.142L 214.401 257.142L 215.236 257.977L 215.236 293.466L 214.401 294.301"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 4.8016 256.724L 4.8016 294.719L 5.63666 295.554L 215.653 295.554L 216.488 294.719L 216.488 256.724L 215.653 255.889L 5.63678 255.889L 4.8016 256.724"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 240.649L 202.71 241.484L 18.58 241.484L 17.745 240.649L 17.745 138.146L 18.58 137.311L 202.71 137.311L 203.545 138.146L 203.545 240.649"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 241.901L 203.963 242.737L 17.3274 242.737L 16.4924 241.902L 16.4924 136.894L 17.3274 136.059L 203.963 136.059L 204.798 136.893L 204.798 241.902"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 218.52L 180.581 219.773L 40.709 219.773L 39.4564 218.52L 39.4564 160.275L 40.709 159.023L 180.581 159.023L 181.834 160.275L 181.834 218.52"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3587 150.672L 31.1059 151.924L 31.1059 226.871L 32.3585 228.124L 188.932 228.124L 190.184 226.871L 190.184 151.925L 188.932 150.672L 32.3585 150.672"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 628.533L 180.581 629.786L 40.709 629.786L 39.4564 628.533L 39.4564 332.923L 40.709 331.671L 180.581 331.671L 181.834 332.923L 181.834 628.533"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3586 323.32L 31.1059 324.573L 31.1059 636.884L 32.3584 638.136L 188.932 638.136L 190.184 636.884L 190.184 324.573L 188.932 323.32L 32.3585 323.32"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 650.662L 202.71 651.497L 18.58 651.497L 17.7449 650.662L 17.745 310.794L 18.58 309.959L 202.71 309.959L 203.545 310.794L 203.545 650.662"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 651.915L 203.963 652.75L 17.3274 652.75L 16.4924 651.915L 16.4924 309.541L 17.3274 308.706L 203.963 308.706L 204.798 309.541L 204.798 651.915"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 215.236 703.479L 214.401 704.314L 6.88921 704.314L 6.05416 703.479L 6.05416 667.99L 6.88921 667.154L 214.401 667.154L 215.236 667.99L 215.236 703.479"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 5.63658 665.902L 4.80157 666.737L 4.80157 704.732L 5.63663 705.567L 215.653 705.567L 216.488 704.732L 216.488 666.737L 215.653 665.902L 5.63663 665.902"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 801.181L 180.581 802.434L 40.709 802.434L 39.4564 801.181L 39.4564 742.936L 40.709 741.683L 180.581 741.683L 181.834 742.936L 181.834 801.181"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3585 733.333L 31.1059 734.585L 31.1059 809.532L 32.3584 810.784L 188.932 810.784L 190.184 809.532L 190.184 734.585L 188.932 733.333L 32.3584 733.333"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 823.31L 202.71 824.145L 18.58 824.145L 17.7449 823.31L 17.7449 720.807L 18.58 719.972L 202.71 719.972L 203.545 720.807L 203.545 823.31"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 824.562L 203.963 825.398L 17.3274 825.398L 16.4924 824.563L 16.4924 719.554L 17.3274 718.719L 203.963 718.719L 204.798 719.554L 204.798 824.563"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 716.214L 207.303 827.903L 13.9872 827.903L 13.9872 716.214L 207.303 716.214"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 306.201L 207.303 655.255L 13.9872 655.255L 13.9872 306.201L 207.303 306.201"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 133.553L 207.303 245.242L 13.9872 245.242L 13.9872 133.553L 207.303 133.553"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 707.028L 4.80157 707.028L 4.80157 837.088L 216.488 837.088L 216.488 707.028"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 297.016L 4.8016 297.016L 4.80157 664.44L 216.488 664.44L 216.488 297.016"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 124.368L 4.8016 124.368L 4.8016 254.428L 216.488 254.428L 216.488 124.368"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 217.95 124.159L 217.95 837.297L 216.697 838.55L 4.59281 838.55L 3.34023 837.297L 3.34025 124.159L 4.59284 122.906L 216.697 122.906L 217.95 124.159"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.697 121.654L 4.59284 121.654L 2.08767 124.159L 2.08764 837.297L 4.59281 839.802L 216.697 839.802L 219.202 837.297L 219.202 124.159L 216.697 121.654"/>
            <path style="stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 221.29 119.566L 221.29 841.89L 0 841.89L 2.54692e-05 119.566L 221.29 119.566"/>
        `;
        
        let originalBoundingBox = { x: 0, y: 119.566, width: 221.29, height: 722.324 };

        document.getElementById('inputFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, "image/svg+xml");
                const svgNode = doc.querySelector('svg');
                
                if (svgNode) {
                    currentPanelSvgContent = svgNode.innerHTML;
                    
                    const measureSvg = document.getElementById('measureSvg');
                    measureSvg.innerHTML = currentPanelSvgContent;
                    
                    try {
                        const gElement = measureSvg.querySelector('g') || measureSvg;
                        const bbox = gElement.getBBox();
                        if (bbox && bbox.width > 0 && bbox.height > 0) {
                            originalBoundingBox = {
                                x: bbox.x,
                                y: bbox.y,
                                width: bbox.width,
                                height: bbox.height
                            };
                        }
                    } catch(err) {
                        console.warn("Lỗi tính bbox:", err);
                    }

                    const filename = file.name;
                    let parsedW = null;
                    let parsedH = null;

                    const matchWxH = filename.match(/(\d+)\s*x\s*(\d+)/i);
                    if (matchWxH) {
                        parsedW = parseFloat(matchWxH[1]);
                        parsedH = parseFloat(matchWxH[2]);
                    } else {
                        const matchW = filename.match(/_(\d+)/) || filename.match(/\s(\d+)/);
                        if (matchW) {
                            parsedW = parseFloat(matchW[1]);
                            parsedH = parsedW * (originalBoundingBox.height / originalBoundingBox.width);
                        } else {
                            parsedW = originalBoundingBox.width;
                            parsedH = originalBoundingBox.height;
                        }
                    }

                    document.getElementById('inputHuynhW').value = parsedW.toFixed(1);
                    document.getElementById('inputHuynhH').value = parsedH.toFixed(1);

                    drawDoor();
                }
            };
            reader.readAsText(file);
        });

        function drawDoor() {
            const W = parseFloat(document.getElementById('inputW').value) || 0;
            const H = parseFloat(document.getElementById('inputH').value) || 0;
            const huynhWidth = parseFloat(document.getElementById('inputHuynhW').value) || 0;
            const huynhHeight = parseFloat(document.getElementById('inputHuynhH').value) || 0;

            if (W <= 0 || H <= 0 || huynhWidth <= 0 || huynhHeight <= 0) return;

            const { frameTop, frameSide, leafGap, paddingX, paddingY } = CONSTANTS;

            const thongThuyW = W - (frameSide * 2);
            const thongThuyH = H - frameTop;
            
            const leafW = thongThuyW - (leafGap * 2);
            const leafH = thongThuyH - leafGap;
            
            const doCanhNgang = (leafW - huynhWidth) / 2;
            const doCanhDoc = (leafH - huynhHeight) / 2;

            document.getElementById('resThongThuyW').innerText = thongThuyW.toFixed(1) + ' mm';
            document.getElementById('resThongThuyH').innerText = thongThuyH.toFixed(1) + ' mm';
            document.getElementById('resLeafW').innerText = leafW.toFixed(1) + ' mm';
            document.getElementById('resLeafH').innerText = leafH.toFixed(1) + ' mm';
            document.getElementById('resDoNgang').innerText = doCanhNgang.toFixed(1) + ' mm';
            document.getElementById('resDoDoc').innerText = doCanhDoc.toFixed(1) + ' mm';

            const svg = document.getElementById('doorSvg');
            svg.innerHTML = '';
            
            const canvasW = W + paddingX * 2;
            const canvasH = H + paddingY * 2;
            svg.setAttribute('viewBox', `0 0 ${canvasW} ${canvasH}`);

            const startX = paddingX;
            const startY = paddingY;

            let content = '';

            content += `<rect class="door-fill" x="${startX}" y="${startY}" width="${W}" height="${frameTop}" />`;
            content += `<rect class="door-fill" x="${startX}" y="${startY + frameTop}" width="${frameSide}" height="${H - frameTop}" />`;
            content += `<rect class="door-fill" x="${startX + W - frameSide}" y="${startY + frameTop}" width="${frameSide}" height="${H - frameTop}" />`;

            const leafX = startX + frameSide + leafGap;
            const leafY = startY + frameTop + leafGap;
            content += `<rect class="door-fill" x="${leafX}" y="${leafY}" width="${leafW}" height="${leafH}" />`;

            const scaleX = huynhWidth / originalBoundingBox.width;
            const scaleY = huynhHeight / originalBoundingBox.height;
            
            const h1TargetX = leafX + doCanhNgang;
            const h1TargetY = leafY + doCanhDoc;
            
            content += `
                <g class="panel-core" transform="translate(${h1TargetX}, ${h1TargetY}) scale(${scaleX}, ${scaleY}) translate(${-originalBoundingBox.x}, ${-originalBoundingBox.y})">
                    ${currentPanelSvgContent}
                </g>
            `;

            const dimOffset = 60;

            const drawDimRed = (x1, y1, x2, y2, text, textX, textY) => {
                return `
                    <line class="dim-line-red" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />
                    <line class="dim-line-red" x1="${x1}" y1="${y1-15}" x2="${x1}" y2="${y1+15}" />
                    <line class="dim-line-red" x1="${x2}" y1="${y2-15}" x2="${x2}" y2="${y2+15}" />
                    <text class="dim-text-red" x="${textX}" y="${textY}">${text}</text>
                `;
            };

            const drawDimBlue = (x1, y1, x2, y2, text, textX, textY, horizontal = true) => {
                const tickLen = 10;
                let t1x1, t1y1, t1x2, t1y2, t2x1, t2y1, t2x2, t2y2;
                if(horizontal) {
                    t1x1 = x1; t1y1 = y1 - tickLen; t1x2 = x1; t1y2 = y1 + tickLen;
                    t2x1 = x2; t2y1 = y2 - tickLen; t2x2 = x2; t2y2 = y2 + tickLen;
                } else {
                    t1x1 = x1 - tickLen; t1y1 = y1; t1x2 = x1 + tickLen; t1y2 = y1;
                    t2x1 = x2 - tickLen; t2y1 = y2; t2x2 = x2 + tickLen; t2y2 = y2;
                }
                
                return `
                    <line class="dim-line-blue" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />
                    <line class="dim-line-blue" x1="${t1x1}" y1="${t1y1}" x2="${t1x2}" y2="${t1y2}" />
                    <line class="dim-line-blue" x1="${t2x1}" y1="${t2y1}" x2="${t2x2}" y2="${t2y2}" />
                    <rect x="${textX - 30}" y="${textY - 15}" width="60" height="30" fill="white" opacity="0.9" rx="4"/>
                    <text class="dim-text-blue" x="${textX}" y="${textY}">${text}</text>
                `;
            };

            content += drawDimRed(
                startX, startY - dimOffset, 
                startX + W, startY - dimOffset, 
                `W = ${W}`, 
                startX + W/2, startY - dimOffset - 20
            );

            content += `
                <line class="dim-line-red" x1="${startX - dimOffset}" y1="${startY}" x2="${startX - dimOffset}" y2="${startY + H}" />
                <line class="dim-line-red" x1="${startX - dimOffset - 15}" y1="${startY}" x2="${startX - dimOffset + 15}" y2="${startY}" />
                <line class="dim-line-red" x1="${startX - dimOffset - 15}" y1="${startY + H}" x2="${startX - dimOffset + 15}" y2="${startY + H}" />
                <text class="dim-text-red" x="${startX - dimOffset - 25}" y="${startY + H/2}" transform="rotate(-90 ${startX - dimOffset - 25},${startY + H/2})">H = ${H}</text>
            `;

            const cy = leafY + leafH/2;
            content += drawDimBlue(
                leafX, cy, 
                leafX + doCanhNgang, cy, 
                doCanhNgang.toFixed(1), 
                leafX + doCanhNgang/2, cy,
                true
            );

            content += drawDimBlue(
                leafX + leafW - doCanhNgang, cy, 
                leafX + leafW, cy, 
                doCanhNgang.toFixed(1), 
                leafX + leafW - doCanhNgang/2, cy,
                true
            );

            const cx = leafX + leafW/2;
            content += drawDimBlue(
                cx, leafY, 
                cx, leafY + doCanhDoc, 
                doCanhDoc.toFixed(1), 
                cx, leafY + doCanhDoc/2,
                false
            );

            content += drawDimBlue(
                cx, leafY + leafH - doCanhDoc, 
                cx, leafY + leafH, 
                doCanhDoc.toFixed(1), 
                cx, leafY + leafH - doCanhDoc/2,
                false
            );

            svg.innerHTML = content;
        }

        document.getElementById('inputW').addEventListener('input', drawDoor);
        document.getElementById('inputH').addEventListener('input', drawDoor);

        drawDoor();
    </script>
</body>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parametric 2D Door Drawing</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="sidebar">
        <h1>Thông Số Cửa</h1>
        
        <div class="view-toggle" style="display: none;">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="inputW">Chiều rộng (W) mm</label>
                <input type="number" id="inputW" value="900" min="500" max="2000" step="1">
            </div>
            <div class="form-group">
                <label for="inputH">Chiều cao (H) mm</label>
                <input type="number" id="inputH" value="2290" min="1800" max="3000" step="1">
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 16px 0;">
        
        <div class="form-group">
            <label for="selectFile">Chọn lõi Huỳnh có sẵn</label>
            <select id="selectFile">
                <option value="">-- Chọn lõi Huỳnh --</option>
            </select>
            <small style="color: #64748b; font-size: 0.8rem; display: block; margin-top: 4px;">
                *Dữ liệu tự động tải từ bộ sưu tập.
            </small>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="inputHuynhW">Rộng Huỳnh (mm)</label>
                <input type="number" id="inputHuynhW" value="520" step="0.1">
            </div>
            <div class="form-group">
                <label for="inputHuynhH">Cao Huỳnh (mm)</label>
                <input type="number" id="inputHuynhH" value="1720" step="0.1">
            </div>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" id="showSections" checked>
                Hiển thị ký hiệu mặt cắt (A-A, B-B)
            </label>
        </div>

        <div class="result-panel">
            <h3>Kết Quả Tính Toán</h3>
            
            <div class="result-item">
                <span>Thông thuỷ ngang:</span>
                <span id="resThongThuyW" class="result-value">-</span>
            </div>
            <div class="result-item" style="margin-bottom: 12px;">
                <span>Thông thuỷ dọc:</span>
                <span id="resThongThuyH" class="result-value">-</span>
            </div>

            <div class="result-item">
                <span>Kích thước cánh rộng:</span>
                <span id="resLeafW" class="result-value">-</span>
            </div>
            <div class="result-item" style="margin-bottom: 12px;">
                <span>Kích thước cánh cao:</span>
                <span id="resLeafH" class="result-value">-</span>
            </div>

            <div class="result-item">
                <span>Đố cánh ngang:</span>
                <span id="resDoNgang" class="result-value">-</span>
            </div>
            <div class="result-item">
                <span>Đố cánh dọc:</span>
                <span id="resDoDoc" class="result-value">-</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-container">
            <svg id="doorSvg" xmlns="http://www.w3.org/2000/svg">
                <!-- SVG Content generated by JS -->
            </svg>
            
            <!-- Vùng ẩn để đo đạc bounding box của file SVG vừa upload -->
            <div id="hiddenSvgContainer">
                <svg id="measureSvg" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>
    </div>

    <script src="svgData.js"></script>
    <script>
        const CONSTANTS = {
            frameTop: 35,    
            frameSide: 35,
            leafGap: 3,
            paddingX: 200,
            paddingY: 200,
            frameDepth: 130,
            leafDepth: 50
        };

        let khungProcessedSvg = '';
        if (typeof svgData !== 'undefined' && svgData['KHUNG.svg']) {
            const text = decodeBase64Utf8(svgData['KHUNG.svg']);
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, "image/svg+xml");
            const paths = doc.querySelectorAll('path');
            paths.forEach(p => {
                let d = p.getAttribute('d');
                if (d) {
                    khungProcessedSvg += `<path d="${d}" fill="none" stroke="#0ea5e9" stroke-width="1.5" vector-effect="non-scaling-stroke"/>\n`;
                }
            });
        }

        let currentPanelSvgContent = '';
        let originalBoundingBox = { x: 0, y: 0, width: 0, height: 0 };

        function decodeBase64Utf8(base64) {
            const binaryString = atob(base64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        const selectFile = document.getElementById('selectFile');
        if (typeof svgData !== 'undefined') {
            const sortedKeys = Object.keys(svgData).sort();
            for (let filename of sortedKeys) {
                const option = document.createElement('option');
                option.value = filename;
                option.textContent = filename.replace(/\.svg$/i, '');
                selectFile.appendChild(option);
            }
        }

        selectFile.addEventListener('change', function() {
            const filename = this.value;
            if (!filename || !svgData[filename]) return;

            const text = decodeBase64Utf8(svgData[filename]);
            const parser = new DOMParser();
            const doc = parser.parseFromString(text, "image/svg+xml");
            const svgNode = doc.querySelector('svg');
            
            if (svgNode) {
                currentPanelSvgContent = svgNode.innerHTML;
                
                const measureSvg = document.getElementById('measureSvg');
                measureSvg.innerHTML = currentPanelSvgContent;
                
                try {
                    const gElement = measureSvg.querySelector('g') || measureSvg;
                    const bbox = gElement.getBBox();
                        if (bbox && bbox.width > 0 && bbox.height > 0) {
                            originalBoundingBox = {
                                x: bbox.x,
                                y: bbox.y,
                                width: bbox.width,
                                height: bbox.height
                            };
                        }
                    } catch(err) {
                        console.warn("Lỗi tính bbox:", err);
                    }

                    let filenameWithoutExt = filename.replace(/\.svg$/i, '').trim();
                    let upperName = filenameWithoutExt.toUpperCase();
                    let parsedW = null;
                    let parsedH = null;

                    const matchWxH = filenameWithoutExt.match(/(\d+)\s*x\s*(\d+)/i);
                    
                    if (matchWxH) {
                        parsedW = parseFloat(matchWxH[1]);
                        parsedH = parseFloat(matchWxH[2]);
                    } else {
                        const dict = {
                            'H1 PHAY': { w: 260, h: 1720 },
                            'H1':      { w: 520, h: 1720 },
                            'H2':      { w: 520, h: 1720 },
                            'H3':      { w: 520, h: 1720 },
                            'H4':      { w: 520, h: 1720 },
                            'H4 PHAY': { w: 420, h: 1720 },
                            'H5':      { w: 520, h: 1720 },
                            'H6':      { w: 260, h: 1720 },
                            'H7':      { w: 520, h: 1720 },
                            'H8':      { w: 520, h: 1720 },
                            'TĐ':      { w: 520, h: 1720 }
                        };
                        
                        if (dict[upperName]) {
                            parsedW = dict[upperName].w;
                            parsedH = dict[upperName].h;
                        }
                        else if (upperName.startsWith('H9')) {
                            const matchW = upperName.match(/_(\d+)/) || upperName.match(/\s(\d+)/);
                            if (matchW) {
                                parsedW = parseFloat(matchW[1]);
                                parsedH = 1720;
                            }
                        }
                        
                        if (parsedW === null || parsedH === null) {
                            parsedW = originalBoundingBox.width;
                            parsedH = originalBoundingBox.height;
                        }
                    }

                    document.getElementById('inputHuynhW').value = parsedW.toFixed(1);
                    document.getElementById('inputHuynhH').value = parsedH.toFixed(1);

                    drawDoor();
                }
        });

        let vbX = 0, vbY = 0, vbW = 0, vbH = 0;
        let isPanning = false;
        let startPanX = 0, startPanY = 0;
        const doorSvg = document.getElementById('doorSvg');
        doorSvg.style.cursor = 'grab';

        doorSvg.addEventListener('mousedown', (e) => {
            isPanning = true;
            startPanX = e.clientX;
            startPanY = e.clientY;
            doorSvg.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            e.preventDefault();
            const rect = doorSvg.getBoundingClientRect();
            // preserveAspectRatio="xMidYMid meet" (default)
            const ratio = Math.max(vbW / rect.width, vbH / rect.height);
            const dx = (e.clientX - startPanX) * ratio;
            const dy = (e.clientY - startPanY) * ratio;
            
            vbX -= dx;
            vbY -= dy;
            doorSvg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
            
            startPanX = e.clientX;
            startPanY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                doorSvg.style.cursor = 'grab';
            }
        });

        doorSvg.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomSensitivity = 0.1;
            const delta = e.deltaY > 0 ? 1 : -1; // cuộn xuống = zoom out = tăng vbW
            
            const rect = doorSvg.getBoundingClientRect();
            const ratio = Math.max(vbW / rect.width, vbH / rect.height);
            
            // Toạ độ chuột trong không gian SVG
            const mouseX = vbX + (e.clientX - rect.left) * ratio;
            const mouseY = vbY + (e.clientY - rect.top) * ratio;
            
            const zoomFactor = 1 + delta * zoomSensitivity;
            const newVbW = vbW * zoomFactor;
            const newVbH = vbH * zoomFactor;
            
            // Giới hạn zoom
            if (newVbW > 100 && newVbW < 20000) {
                vbX = mouseX - (mouseX - vbX) * zoomFactor;
                vbY = mouseY - (mouseY - vbY) * zoomFactor;
                vbW = newVbW;
                vbH = newVbH;
                doorSvg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
            }
        }, { passive: false });

        doorSvg.addEventListener('dblclick', () => {
            // Reset view
            const W = parseFloat(document.getElementById('inputW').value) || 0;
            const H = parseFloat(document.getElementById('inputH').value) || 0;
            const canvasW = W + CONSTANTS.paddingX * 2 + 400 + CONSTANTS.frameDepth;
            const canvasH = H + CONSTANTS.paddingY * 2 + 400 + CONSTANTS.frameDepth;
            vbX = 0;
            vbY = 0;
            vbW = canvasW;
            vbH = canvasH;
            doorSvg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
        });

        function drawDoor() {
            const W = parseFloat(document.getElementById('inputW').value) || 0;
            const H = parseFloat(document.getElementById('inputH').value) || 0;
            const huynhWidth = parseFloat(document.getElementById('inputHuynhW').value) || 0;
            const huynhHeight = parseFloat(document.getElementById('inputHuynhH').value) || 0;

            if (W <= 0 || H <= 0 || huynhWidth <= 0 || huynhHeight <= 0) return;

            const { frameTop, frameSide, leafGap, paddingX, paddingY } = CONSTANTS;

            const thongThuyW = W - (frameSide * 2);
            const thongThuyH = H - frameTop;
            
            const leafW = thongThuyW - (leafGap * 2);
            const leafH = thongThuyH - leafGap - 5; // Khe hở trên là leafGap(3), khe hở chân là 5
            
            const doCanhNgang = (leafW - huynhWidth) / 2;
            const doCanhDoc = (leafH - huynhHeight) / 2;

            document.getElementById('resThongThuyW').innerText = thongThuyW.toFixed(1) + ' mm';
            document.getElementById('resThongThuyH').innerText = thongThuyH.toFixed(1) + ' mm';
            document.getElementById('resLeafW').innerText = leafW.toFixed(1) + ' mm';
            document.getElementById('resLeafH').innerText = leafH.toFixed(1) + ' mm';
            document.getElementById('resDoNgang').innerText = doCanhNgang.toFixed(1) + ' mm';
            document.getElementById('resDoDoc').innerText = doCanhDoc.toFixed(1) + ' mm';

            const svg = document.getElementById('doorSvg');
            svg.innerHTML = '';
            
            const startX = paddingX;
            const startY = paddingY;
            let content = '';

            let bboxW = originalBoundingBox.width;
            let bboxH = originalBoundingBox.height;
            if (bboxW === 0 || bboxH === 0) {
                bboxW = 221.29; // Fallback to H1 default width
                bboxH = 722.324; // Fallback to H1 default height
            }
            
            const scaleX = huynhWidth / bboxW;
            const scaleY = huynhHeight / bboxH;
            
            const leafX = startX + frameSide + leafGap;
            const leafY = startY + frameTop + leafGap;
            const h1TargetX = leafX + doCanhNgang;
            const h1TargetY = leafY + doCanhDoc;

                content += `<rect class="door-fill" x="${startX}" y="${startY}" width="${frameSide}" height="${H}" />`;
                content += `<rect class="door-fill" x="${startX + W - frameSide}" y="${startY}" width="${frameSide}" height="${H}" />`;
                content += `<rect class="door-fill" x="${startX + frameSide}" y="${startY}" width="${W - frameSide * 2}" height="${frameTop}" />`;

                content += `<rect class="door-fill" x="${leafX}" y="${leafY}" width="${leafW}" height="${leafH}" />`;

                content += `
                    <g class="panel-core" transform="translate(${h1TargetX}, ${h1TargetY}) scale(${scaleX}, ${scaleY}) translate(${-originalBoundingBox.x}, ${-originalBoundingBox.y})">
                        ${currentPanelSvgContent}
                    </g>
                `;

                const dimOffset = 60;

                const drawDimRed = (x1, y1, x2, y2, text, textX, textY) => {
                    return `
                        <line class="dim-line-red" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />
                        <line class="dim-line-red" x1="${x1}" y1="${y1-15}" x2="${x1}" y2="${y1+15}" />
                        <line class="dim-line-red" x1="${x2}" y1="${y2-15}" x2="${x2}" y2="${y2+15}" />
                        <text class="dim-text-red" x="${textX}" y="${textY}">${text}</text>
                    `;
                };

                const drawDimBlue = (x1, y1, x2, y2, text, textX, textY, horizontal = true) => {
                    const tickLen = 10;
                    let t1x1, t1y1, t1x2, t1y2, t2x1, t2y1, t2x2, t2y2;
                    if(horizontal) {
                        t1x1 = x1; t1y1 = y1 - tickLen; t1x2 = x1; t1y2 = y1 + tickLen;
                        t2x1 = x2; t2y1 = y2 - tickLen; t2x2 = x2; t2y2 = y2 + tickLen;
                    } else {
                        t1x1 = x1 - tickLen; t1y1 = y1; t1x2 = x1 + tickLen; t1y2 = y1;
                        t2x1 = x2 - tickLen; t2y1 = y2; t2x2 = x2 + tickLen; t2y2 = y2;
                    }
                    
                    return `
                        <line class="dim-line-blue" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />
                        <line class="dim-line-blue" x1="${t1x1}" y1="${t1y1}" x2="${t1x2}" y2="${t1y2}" />
                        <line class="dim-line-blue" x1="${t2x1}" y1="${t2y1}" x2="${t2x2}" y2="${t2y2}" />
                        <rect x="${textX - 30}" y="${textY - 15}" width="60" height="30" fill="white" opacity="0.9" rx="4"/>
                        <text class="dim-text-blue" x="${textX}" y="${textY}">${text}</text>
                    `;
                };

                content += drawDimRed(
                    startX, startY - dimOffset, 
                    startX + W, startY - dimOffset, 
                    `W = ${W}`, 
                    startX + W/2, startY - dimOffset - 20
                );

                content += `
                    <line class="dim-line-red" x1="${startX - dimOffset}" y1="${startY}" x2="${startX - dimOffset}" y2="${startY + H}" />
                    <line class="dim-line-red" x1="${startX - dimOffset - 15}" y1="${startY}" x2="${startX - dimOffset + 15}" y2="${startY}" />
                    <line class="dim-line-red" x1="${startX - dimOffset - 15}" y1="${startY + H}" x2="${startX - dimOffset + 15}" y2="${startY + H}" />
                    <text class="dim-text-red" x="${startX - dimOffset - 25}" y="${startY + H/2}" transform="rotate(-90 ${startX - dimOffset - 25},${startY + H/2})">H = ${H}</text>
                `;

                const cy = leafY + leafH/2;
                content += drawDimBlue(
                    leafX, cy, 
                    leafX + doCanhNgang, cy, 
                    doCanhNgang.toFixed(1), 
                    leafX + doCanhNgang/2, cy,
                    true
                );

                content += drawDimBlue(
                    leafX + leafW - doCanhNgang, cy, 
                    leafX + leafW, cy, 
                    doCanhNgang.toFixed(1), 
                    leafX + leafW - doCanhNgang/2, cy,
                    true
                );

                const cx = leafX + leafW/2;
                content += drawDimBlue(
                    cx, leafY, 
                    cx, leafY + doCanhDoc, 
                    doCanhDoc.toFixed(1), 
                    cx, leafY + doCanhDoc/2,
                    false
                );

                content += drawDimBlue(
                    cx, leafY + leafH - doCanhDoc, 
                    cx, leafY + leafH, 
                    doCanhDoc.toFixed(1), 
                    cx, leafY + leafH - doCanhDoc/2,
                    false
                );

                // TÙY CHỌN VẼ KÝ HIỆU MẶT CẮT (A-A, B-B)
                const showSections = document.getElementById('showSections') ? document.getElementById('showSections').checked : false;
                if (showSections) {
                    const vCutX = startX + W * 0.35; // Cắt dọc ở 35% từ bên trái (cắt qua phần cánh và huỳnh)
                    const vCutY1 = startY - 40;
                    const vCutY2 = startY + H + 40;
                    
                    const hCutY = startY + H * 0.5; // Cắt ngang chính giữa cửa
                    const hCutX1 = startX - 100; // Để vượt ra ngoài đường kích thước H (-60)
                    const hCutX2 = startX + W + 60;

                    content += `
                        <!-- Dường cắt dọc (A-A) -->
                        <line class="section-line" x1="${vCutX}" y1="${vCutY1}" x2="${vCutX}" y2="${vCutY2}" />
                        
                        <!-- Mũi tên trên (cắt dọc) -->
                        <line class="section-line-solid" x1="${vCutX}" y1="${vCutY1}" x2="${vCutX}" y2="${vCutY1 + 20}" />
                        <line class="section-line-solid" x1="${vCutX}" y1="${vCutY1}" x2="${vCutX - 35}" y2="${vCutY1}" />
                        <polygon class="section-arrow" points="${vCutX-35},${vCutY1} ${vCutX-20},${vCutY1-6} ${vCutX-20},${vCutY1+6}" />
                        <text class="section-text" x="${vCutX-15}" y="${vCutY1-15}">A</text>
                        
                        <!-- Mũi tên dưới (cắt dọc) -->
                        <line class="section-line-solid" x1="${vCutX}" y1="${vCutY2}" x2="${vCutX}" y2="${vCutY2 - 20}" />
                        <line class="section-line-solid" x1="${vCutX}" y1="${vCutY2}" x2="${vCutX - 35}" y2="${vCutY2}" />
                        <polygon class="section-arrow" points="${vCutX-35},${vCutY2} ${vCutX-20},${vCutY2-6} ${vCutX-20},${vCutY2+6}" />
                        <text class="section-text" x="${vCutX-15}" y="${vCutY2+30}">A</text>

                        <!-- Đường cắt ngang (B-B) -->
                        <line class="section-line" x1="${hCutX1}" y1="${hCutY}" x2="${hCutX2}" y2="${hCutY}" />
                        
                        <!-- Mũi tên trái (cắt ngang) -->
                        <line class="section-line-solid" x1="${hCutX1}" y1="${hCutY}" x2="${hCutX1 + 20}" y2="${hCutY}" />
                        <line class="section-line-solid" x1="${hCutX1}" y1="${hCutY}" x2="${hCutX1}" y2="${hCutY + 35}" />
                        <polygon class="section-arrow" points="${hCutX1},${hCutY+35} ${hCutX1-6},${hCutY+20} ${hCutX1+6},${hCutY+20}" />
                        <text class="section-text" x="${hCutX1-20}" y="${hCutY+20}">B</text>
                        
                        <!-- Mũi tên phải (cắt ngang) -->
                        <line class="section-line-solid" x1="${hCutX2}" y1="${hCutY}" x2="${hCutX2 - 20}" y2="${hCutY}" />
                        <line class="section-line-solid" x1="${hCutX2}" y1="${hCutY}" x2="${hCutX2}" y2="${hCutY + 35}" />
                        <polygon class="section-arrow" points="${hCutX2},${hCutY+35} ${hCutX2-6},${hCutY+20} ${hCutX2+6},${hCutY+20}" />
                        <text class="section-text" x="${hCutX2+20}" y="${hCutY+20}">B</text>
                    `;
                }
            
            // Vẽ thêm 2 mặt cắt bên cạnh và bên dưới
            content += drawSections(W, H);

            // Cập nhật viewBox để bao trọn cả 3 hình chiếu
            const canvasW = W + CONSTANTS.paddingX * 2 + 400 + CONSTANTS.frameDepth;
            const canvasH = H + CONSTANTS.paddingY * 2 + 400 + CONSTANTS.frameDepth;
            
            if (vbW === 0 || vbH === 0) {
                vbX = 0;
                vbY = 0;
                vbW = canvasW;
                vbH = canvasH;
            }
            svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
            svg.innerHTML = content;
        }

        function drawSections(W, H) {
            let content = '';
            
            const t = 1.5; 
            const fW = CONSTANTS.frameSide; 
            const fT = CONSTANTS.frameTop;  
            const fD = CONSTANTS.frameDepth; 
            const gap = CONSTANTS.leafGap; 
            const leafD = CONSTANTS.leafDepth; 
            const bottomGap = 5; 

            // Thông số tính toán từ KHUNG.svg
            const fW_front = 22.26; // Độ dày mép trong mặt trước
            const rD = 74.69; // Chiều sâu hèm từ mặt sau
            const rW = 12.74; // Độ sâu bậc hèm (rabbet step)

            const drawDim = (x1, y1, x2, y2, text, textOffset, vertical = false) => {
                const tick = 10;
                let html = `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#ef4444" stroke-width="1.5" />`;
                if (vertical) {
                    html += `<line x1="${x1 - tick}" y1="${y1}" x2="${x1 + tick}" y2="${y1}" stroke="#ef4444" stroke-width="1.5" />`;
                    html += `<line x1="${x2 - tick}" y1="${y2}" x2="${x2 + tick}" y2="${y2}" stroke="#ef4444" stroke-width="1.5" />`;
                    html += `<text x="${x1 + textOffset}" y="${(y1 + y2)/2}" text-anchor="middle" dominant-baseline="middle" transform="rotate(-90 ${x1 + textOffset},${(y1 + y2)/2})" fill="#ef4444" font-size="14" font-weight="bold">${text}</text>`;
                } else {
                    html += `<line x1="${x1}" y1="${y1 - tick}" x2="${x1}" y2="${y1 + tick}" stroke="#ef4444" stroke-width="1.5" />`;
                    html += `<line x1="${x2}" y1="${y2 - tick}" x2="${x2}" y2="${y2 + tick}" stroke="#ef4444" stroke-width="1.5" />`;
                    html += `<text x="${(x1 + x2)/2}" y="${y1 + textOffset}" text-anchor="middle" dominant-baseline="middle" fill="#ef4444" font-size="14" font-weight="bold">${text}</text>`;
                }
                return html;
            };

            const getFramePath = (x, y, mode) => {
                const scaleX = fD / 4.494;
                const scaleY = fW / 1.676;
                const origX = 145.911;
                const origY = 398.236;
                
                let matrix = '';
                if (mode === 'left') {
                    matrix = `matrix(0, ${scaleX}, ${scaleY}, 0, ${x}, ${y})`;
                } else if (mode === 'right') {
                    matrix = `matrix(0, ${scaleX}, ${-scaleY}, 0, ${x + fW}, ${y})`;
                } else if (mode === 'top') {
                    matrix = `matrix(${scaleX}, 0, 0, ${scaleY}, ${x}, ${y})`;
                }
                
                return `<g transform="${matrix} translate(${-origX}, ${-origY})">${khungProcessedSvg}</g>`;
            };

            const getHollowRect = (x, y, w, h) => {
                let html = '';
                html += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#f8fafc" stroke="#0ea5e9" stroke-width="1.5"/>`;
                html += `<rect x="${x+t}" y="${y+t}" width="${w-2*t}" height="${h-2*t}" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>`;
                return html;
            };

            // --- BẢN VẼ MẶT CẮT NGANG (B-B) (Hình chiếu bằng) ---
            const startX = CONSTANTS.paddingX;
            const startY = CONSTANTS.paddingY + H + 250;
            
            // Khuôn trái
            content += getFramePath(startX, startY, 'left');
            // Khuôn phải
            content += getFramePath(startX + W - fW, startY, 'right');
            
            // Cánh
            // Mép mặt trước của khuôn là fW_front. Khoảng cách (gap) 3mm tính từ fW_front.
            const leafX = startX + fW_front + gap;
            const leafW = W - fW_front*2 - gap*2;
            const leafY = startY + fD - leafD; // Cánh phẳng với mặt trước khuôn (y + fD)
            content += getHollowRect(leafX, leafY, leafW, leafD);

            // Dim Mặt cắt ngang
            content += drawDim(startX, startY - 30, startX + W, startY - 30, W, -15);
            content += drawDim(startX + fW, startY + fD + 30, startX + W - fW, startY + fD + 30, (W - fW*2).toFixed(1), 15); // Thông thuỷ
            content += drawDim(leafX, leafY + leafD + 60, leafX + leafW, leafY + leafD + 60, leafW.toFixed(1), 15); // Chiều rộng cánh

            // --- BẢN VẼ MẶT CẮT DỌC (A-A) (Hình chiếu cạnh) ---
            const vStartX = CONSTANTS.paddingX + W + 250;
            const vStartY = CONSTANTS.paddingY; 

            // Khuôn trên
            content += getFramePath(vStartX, vStartY, 'top');
            
            // Cánh
            const vLeafY = vStartY + fW_front + gap;
            const vLeafH = H - fW_front - gap - bottomGap; // Trừ khe hở dưới chân 5mm
            const vLeafX = vStartX + fD - leafD; // Bằng mặt khuôn phía trước
            content += getHollowRect(vLeafX, vLeafY, leafD, vLeafH);

            // Nền đất
            content += `<line x1="${vStartX - 50}" y1="${vStartY + H}" x2="${vStartX + fD + 50}" y2="${vStartY + H}" stroke="#94a3b8" stroke-width="3"/>`;

            // Dim Mặt cắt dọc
            content += drawDim(vStartX - 30, vStartY, vStartX - 30, vStartY + H, H, -15, true);
            content += drawDim(vStartX + fD + 30, vStartY + fT, vStartX + fD + 30, vStartY + H, (H - fT).toFixed(1), 15, true); // Thông thuỷ
            content += drawDim(vStartX + fD + 60, vLeafY, vStartX + fD + 60, vLeafY + vLeafH, vLeafH.toFixed(1), 15, true); // Chiều cao cánh

            // Tiêu đề
            content += `<text x="${startX + W/2}" y="${startY + fD + 100}" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#64748b">MẶT CẮT NGANG B-B</text>`;
            content += `<text x="${vStartX + fD/2}" y="${vStartY + H + 80}" text-anchor="middle" font-family="monospace" font-size="20" font-weight="bold" fill="#64748b">MẶT CẮT DỌC A-A</text>`;

            return content;
        }


        if (document.getElementById('btn3D')) {
            document.getElementById('btn3D').addEventListener('click', () => {
                currentViewMode = '3D';
                document.getElementById('btn3D').classList.add('active');
                document.getElementById('btn2D').classList.remove('active');
                drawDoor();
            });
        }

        document.getElementById('inputW').addEventListener('input', drawDoor);
        document.getElementById('inputH').addEventListener('input', drawDoor);
        document.getElementById('inputHuynhW').addEventListener('input', drawDoor);
        document.getElementById('inputHuynhH').addEventListener('input', drawDoor);
        if (document.getElementById('showSections')) {
            document.getElementById('showSections').addEventListener('change', drawDoor);
        }

        if (typeof svgData !== 'undefined' && svgData['H1.svg']) {
            selectFile.value = 'H1.svg';
            selectFile.dispatchEvent(new Event('change'));
        } else {
            drawDoor();
        }
    </script>
</body>
</html>

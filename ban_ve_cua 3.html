<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phần Mềm Vẽ Cửa 2D - Tích hợp Huỳnh H1 (V3)</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; padding: 20px; background-color: #f4f4f9; }
        .sidebar { width: 300px; padding: 20px; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-right: 20px; }
        .drawing-area { flex-grow: 1; background: white; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 20px; display: flex; justify-content: center; align-items: center;}
        input { width: 100%; padding: 8px; margin: 10px 0 20px 0; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px;}
        button:hover { background: #004494; }
        svg { max-height: 85vh; border: 1px dashed #ccc; padding: 10px; background: #fff;}
        .dimension-text { font-family: Arial; font-size: 16px; fill: red; font-weight: bold;}
        .do-canh-text { font-family: Arial; font-size: 14px; fill: #0056b3; font-weight: bold;}
        .info-text { font-size: 13px; color: #333; margin-top: 10px; line-height: 1.5; padding: 10px; background: #e9ecef; border-radius: 5px;}
    </style>
</head>
<body>

    <!-- KHU VỰC NHẬP LIỆU -->
    <div class="sidebar">
        <h3>THÔNG SỐ CỬA</h3>
        <label>Chiều Rộng Phủ Bì (W) - mm:</label>
        <input type="number" id="inputW" value="700">
        
        <label>Chiều Cao Tổng (H) - mm:</label>
        <input type="number" id="inputH" value="2290">

        <button onclick="drawDoor()">CẬP NHẬT BẢN VẼ</button>
        
        <div id="door-info" class="info-text">
            <!-- Hiển thị thông số text -->
        </div>
    </div>

    <!-- KHU VỰC HIỂN THỊ BẢN VẼ -->
    <div class="drawing-area" id="canvas-container">
        <!-- SVG sẽ được render vào đây -->
    </div>

    <script>
        // MÃ SVG HUỲNH H1 ĐẠI CA CUNG CẤP
        const huynhH1_SVG = `
            <g transform="translate(0, -119.5)">
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 214.401 294.302L 6.88924 294.302L 6.05418 293.467L 6.05418 257.977L 6.88924 257.142L 214.401 257.142L 215.236 257.977L 215.236 293.466L 214.401 294.301"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 4.8016 256.724L 4.8016 294.719L 5.63666 295.554L 215.653 295.554L 216.488 294.719L 216.488 256.724L 215.653 255.889L 5.63678 255.889L 4.8016 256.724"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 240.649L 202.71 241.484L 18.58 241.484L 17.745 240.649L 17.745 138.146L 18.58 137.311L 202.71 137.311L 203.545 138.146L 203.545 240.649"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 241.901L 203.963 242.737L 17.3274 242.737L 16.4924 241.902L 16.4924 136.894L 17.3274 136.059L 203.963 136.059L 204.798 136.893L 204.798 241.902"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 218.52L 180.581 219.773L 40.709 219.773L 39.4564 218.52L 39.4564 160.275L 40.709 159.023L 180.581 159.023L 181.834 160.275L 181.834 218.52"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3587 150.672L 31.1059 151.924L 31.1059 226.871L 32.3585 228.124L 188.932 228.124L 190.184 226.871L 190.184 151.925L 188.932 150.672L 32.3585 150.672"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 628.533L 180.581 629.786L 40.709 629.786L 39.4564 628.533L 39.4564 332.923L 40.709 331.671L 180.581 331.671L 181.834 332.923L 181.834 628.533"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3586 323.32L 31.1059 324.573L 31.1059 636.884L 32.3584 638.136L 188.932 638.136L 190.184 636.884L 190.184 324.573L 188.932 323.32L 32.3585 323.32"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 650.662L 202.71 651.497L 18.58 651.497L 17.7449 650.662L 17.745 310.794L 18.58 309.959L 202.71 309.959L 203.545 310.794L 203.545 650.662"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 651.915L 203.963 652.75L 17.3274 652.75L 16.4924 651.915L 16.4924 309.541L 17.3274 308.706L 203.963 308.706L 204.798 309.541L 204.798 651.915"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 215.236 703.479L 214.401 704.314L 6.88921 704.314L 6.05416 703.479L 6.05416 667.99L 6.88921 667.154L 214.401 667.154L 215.236 667.99L 215.236 703.479"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 5.63658 665.902L 4.80157 666.737L 4.80157 704.732L 5.63663 705.567L 215.653 705.567L 216.488 704.732L 216.488 666.737L 215.653 665.902L 5.63663 665.902"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 181.834 801.181L 180.581 802.434L 40.709 802.434L 39.4564 801.181L 39.4564 742.936L 40.709 741.683L 180.581 741.683L 181.834 742.936L 181.834 801.181"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 32.3585 733.333L 31.1059 734.585L 31.1059 809.532L 32.3584 810.784L 188.932 810.784L 190.184 809.532L 190.184 734.585L 188.932 733.333L 32.3584 733.333"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 203.545 823.31L 202.71 824.145L 18.58 824.145L 17.7449 823.31L 17.7449 720.807L 18.58 719.972L 202.71 719.972L 203.545 720.807L 203.545 823.31"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 204.798 824.562L 203.963 825.398L 17.3274 825.398L 16.4924 824.563L 16.4924 719.554L 17.3274 718.719L 203.963 718.719L 204.798 719.554L 204.798 824.563"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 716.214L 207.303 827.903L 13.9872 827.903L 13.9872 716.214L 207.303 716.214"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 306.201L 207.303 655.255L 13.9872 655.255L 13.9872 306.201L 207.303 306.201"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 207.303 133.553L 207.303 245.242L 13.9872 245.242L 13.9872 133.553L 207.303 133.553"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 707.028L 4.80157 707.028L 4.80157 837.088L 216.488 837.088L 216.488 707.028"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 297.016L 4.8016 297.016L 4.80157 664.44L 216.488 664.44L 216.488 297.016"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.488 124.368L 4.8016 124.368L 4.8016 254.428L 216.488 254.428L 216.488 124.368"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 217.95 124.159L 217.95 837.297L 216.697 838.55L 4.59281 838.55L 3.34023 837.297L 3.34025 124.159L 4.59284 122.906L 216.697 122.906L 217.95 124.159"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 216.697 121.654L 4.59284 121.654L 2.08767 124.159L 2.08764 837.297L 4.59281 839.802L 216.697 839.802L 219.202 837.297L 219.202 124.159L 216.697 121.654"/>
                <path style="stroke:#000000; stroke-width:0.85; stroke-linejoin:round; stroke-linecap:round; fill:none" d="M 221.29 119.566L 221.29 841.89L 0 841.89L 2.54692e-05 119.566L 221.29 119.566"/>
            </g>
        `;

        function drawDoor() {
            // 1. Lấy thông số từ ô nhập
            const W = parseFloat(document.getElementById('inputW').value);
            const H = parseFloat(document.getElementById('inputH').value);

            // 2. KÍCH THƯỚC CỐ ĐỊNH 
            const frameTop = 150;     // Khuôn trên
            const frameSide = 50;     // Khuôn 2 bên
            const leafGap = 5;        // Khe hở cánh
            
            // THÔNG SỐ HUỲNH H1
            const huynhWidth = 520; 
            const huynhHeight = 1600; 

            // 3. TÍNH TOÁN CÁC BIẾN SỐ
            const leafW = W - (frameSide * 2) - (leafGap * 2);
            const leafH = H - frameTop - leafGap;
            
            // Tính toán bề rộng ĐỐ CỬA tự động 
            const doCanhNgang = (leafW - huynhWidth) / 2;
            const doCanhDoc = (leafH - huynhHeight) / 2;

            // Hiển thị thông số ra cột trái (Không bật Alert gây phiền nữa)
            document.getElementById('door-info').innerHTML = `
                <b>Kết quả tính toán:</b><br>
                - Kích thước cánh: ${leafW} x ${leafH} mm<br>
                - Lõi huỳnh (Cố định): ${huynhWidth} x ${huynhHeight} mm<br>
                - <b>Đố 2 bên: <span style="color:red">${doCanhNgang} mm</span></b><br>
                - <b>Đố trên/dưới: <span style="color:red">${doCanhDoc} mm</span></b>
            `;

            // 4. CHUYỂN TỶ LỆ HUỲNH
            const scaleFactor = huynhWidth / 221.29; 
            const huynhX = frameSide + leafGap + doCanhNgang;
            const huynhY = frameTop + leafGap + doCanhDoc;

            // 5. VẼ LÊN MÀN HÌNH BẰNG SVG
            let svgCode = `
                <svg viewBox="-100 -50 ${W + 200} ${H + 100}" width="100%" xmlns="http://www.w3.org/2000/svg">
                    
                    <!-- Khung bao ngoài & Lọt lòng -->
                    <rect x="0" y="0" width="${W}" height="${H}" fill="none" stroke="black" stroke-width="2"/>
                    <rect x="${frameSide}" y="${frameTop}" width="${W - frameSide*2}" height="${H - frameTop}" fill="none" stroke="black" stroke-width="1.5"/>

                    <!-- Cánh cửa -->
                    <rect x="${frameSide + leafGap}" y="${frameTop + leafGap}" width="${leafW}" height="${leafH}" fill="#f9f9f9" stroke="black" stroke-width="2"/>

                    <!-- VẼ HUỲNH H1 -->
                    <g transform="translate(${huynhX}, ${huynhY}) scale(${scaleFactor})">
                        ${huynhH1_SVG}
                    </g>

                    <!-- ========================================== -->
                    <!-- GHI CHÚ KÍCH THƯỚC TRỰC TIẾP TRÊN BẢN VẼ -->
                    <!-- ========================================== -->
                    
                    <!-- ĐO ĐỐ CỬA DỌC (Kích thước đố 2 bên) -->
                    <line x1="${frameSide + leafGap}" y1="${H/2}" x2="${frameSide + leafGap + doCanhNgang}" y2="${H/2}" stroke="#0056b3" stroke-width="1.5" stroke-dasharray="4" />
                    <!-- Hai dấu gạch chốt đầu đuôi -->
                    <line x1="${frameSide + leafGap}" y1="${H/2 - 5}" x2="${frameSide + leafGap}" y2="${H/2 + 5}" stroke="#0056b3" stroke-width="1.5" />
                    <line x1="${frameSide + leafGap + doCanhNgang}" y1="${H/2 - 5}" x2="${frameSide + leafGap + doCanhNgang}" y2="${H/2 + 5}" stroke="#0056b3" stroke-width="1.5" />
                    <!-- Text con số kích thước đố ngang -->
                    <text x="${frameSide + leafGap + doCanhNgang/2}" y="${H/2 - 10}" text-anchor="middle" class="do-canh-text">${doCanhNgang.toFixed(1)}</text>

                    <!-- ĐO ĐỐ CỬA NGANG (Kích thước đố trên) -->
                    <line x1="${W/2}" y1="${frameTop + leafGap}" x2="${W/2}" y2="${frameTop + leafGap + doCanhDoc}" stroke="#0056b3" stroke-width="1.5" stroke-dasharray="4" />
                    <!-- Hai dấu gạch chốt đầu đuôi -->
                    <line x1="${W/2 - 5}" y1="${frameTop + leafGap}" x2="${W/2 + 5}" y2="${frameTop + leafGap}" stroke="#0056b3" stroke-width="1.5" />
                    <line x1="${W/2 - 5}" y1="${frameTop + leafGap + doCanhDoc}" x2="${W/2 + 5}" y2="${frameTop + leafGap + doCanhDoc}" stroke="#0056b3" stroke-width="1.5" />
                    <!-- Text con số kích thước đố dọc -->
                    <text x="${W/2 + 10}" y="${frameTop + leafGap + doCanhDoc/2 + 5}" text-anchor="start" class="do-canh-text">${doCanhDoc.toFixed(1)}</text>


                    <!-- ========================================== -->
                    <!-- KÍCH THƯỚC TỔNG (W x H) NHƯ BẢN CŨ -->
                    <line x1="${W + 30}" y1="0" x2="${W + 30}" y2="${H}" stroke="black" stroke-width="1" />
                    <text x="${W + 40}" y="${H/2}" transform="rotate(-90 ${W + 40},${H/2})" text-anchor="middle" fill="black">${H}</text>
                    <text x="${W + 80}" y="${H/2}" text-anchor="start" font-size="30" class="dimension-text">CHIỀU CAO</text>

                    <line x1="0" y1="${H + 30}" x2="${W}" y2="${H + 30}" stroke="black" stroke-width="1" />
                    <text x="${W/2}" y="${H + 20}" text-anchor="middle" fill="black">${W}</text>
                    <text x="${W/2}" y="${H + 70}" text-anchor="middle" font-size="30" class="dimension-text">CHIỀU RỘNG</text>
                </svg>
            `;

            document.getElementById('canvas-container').innerHTML = svgCode;
        }

        window.onload = drawDoor;
    </script>
</body>
</html>
